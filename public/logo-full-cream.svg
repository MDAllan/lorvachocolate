<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 530">
  <defs>
    <style>@import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300&amp;display=swap');</style>
  </defs>

  <!-- Cacao pod: main body -->
  <ellipse cx="400" cy="158" rx="26" ry="55" fill="none" stroke="#F5E0C0" stroke-width="1.3"/>

  <!-- Pod ridges -->
  <path d="M 400,103 Q 410,130 408,158 Q 406,186 400,213" fill="none" stroke="#F5E0C0" stroke-width="0.9" opacity="0.75"/>
  <path d="M 400,103 Q 390,130 392,158 Q 394,186 400,213" fill="none" stroke="#F5E0C0" stroke-width="0.9" opacity="0.75"/>

  <!-- Left wing - sweeping leaf lines -->
  <path d="M 374,138 C 355,122 328,116 295,112 C 328,124 356,133 374,150" fill="none" stroke="#F5E0C0" stroke-width="1.15"/>
  <path d="M 374,158 C 348,155 316,154 282,157 C 316,159 348,162 374,168" fill="none" stroke="#F5E0C0" stroke-width="1.15"/>
  <path d="M 374,177 C 352,180 325,187 295,198 C 325,188 352,182 374,180" fill="none" stroke="#F5E0C0" stroke-width="1.15"/>

  <!-- Right wing - mirror -->
  <path d="M 426,138 C 445,122 472,116 505,112 C 472,124 444,133 426,150" fill="none" stroke="#F5E0C0" stroke-width="1.15"/>
  <path d="M 426,158 C 452,155 484,154 518,157 C 484,159 452,162 426,168" fill="none" stroke="#F5E0C0" stroke-width="1.15"/>
  <path d="M 426,177 C 448,180 475,187 505,198 C 475,188 448,182 426,180" fill="none" stroke="#F5E0C0" stroke-width="1.15"/>

  <!-- Top stem -->
  <line x1="400" y1="103" x2="400" y2="82" stroke="#F5E0C0" stroke-width="1.2"/>

  <!-- Top fronds/leaves -->
  <path d="M 400,86 Q 388,73 378,58" stroke="#F5E0C0" stroke-width="1" fill="none"/>
  <path d="M 400,86 Q 412,73 422,58" stroke="#F5E0C0" stroke-width="1" fill="none"/>
  <path d="M 400,84 Q 384,68 372,52" stroke="#F5E0C0" stroke-width="0.8" fill="none" opacity="0.65"/>
  <path d="M 400,84 Q 416,68 428,52" stroke="#F5E0C0" stroke-width="0.8" fill="none" opacity="0.65"/>
  <path d="M 400,82 Q 392,65 390,48" stroke="#F5E0C0" stroke-width="0.65" fill="none" opacity="0.45"/>
  <path d="M 400,82 Q 408,65 410,48" stroke="#F5E0C0" stroke-width="0.65" fill="none" opacity="0.45"/>

  <!-- LORVA -->
  <text
    x="400" y="338"
    text-anchor="middle"
    font-family="'Cormorant Garamond', Cormorant, Didot, 'Big Caslon', Garamond, Georgia, serif"
    font-size="138"
    font-weight="300"
    fill="#F5E0C0"
    letter-spacing="16"
  >LORVA</text>

  <!-- FINE CHOCOLATE -->
  <text
    x="400" y="392"
    text-anchor="middle"
    font-family="'Cormorant Garamond', Cormorant, Didot, 'Big Caslon', Garamond, Georgia, serif"
    font-size="23"
    font-weight="300"
    fill="#F5E0C0"
    letter-spacing="13"
  >FINE CHOCOLATE</text>
</svg>
